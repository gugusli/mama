<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feliz Cumpleaños Mamá 🌸</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;1,300;1,500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a0a05;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
    font-family: 'Cormorant Garamond', serif;
  }

  #garden-canvas {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 60%;
    pointer-events: none;
    z-index: 0;
  }

  #petal-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 10;
  }

  .card {
    position: relative;
    z-index: 5;
    text-align: center;
    padding: 3rem 4rem;
    max-width: 680px;
    width: 90%;
    margin: 2rem auto;
  }

  .para {
    font-size: 0.9rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: #c8845a;
    margin-bottom: 1rem;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(3rem, 8vw, 5.5rem);
    color: #f5e6d3;
    line-height: 1.05;
    font-weight: 400;
    margin-bottom: 0.3rem;
    text-shadow: 0 0 60px rgba(200,100,50,0.3);
  }

  h1 em {
    font-style: italic;
    color: #e8b48a;
  }

  .subtitle {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.4rem, 3.5vw, 2rem);
    color: #c8845a;
    font-style: italic;
    margin-bottom: 2.5rem;
    font-weight: 400;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 1rem;
    justify-content: center;
    margin: 1.5rem 0;
  }

  .divider-line {
    height: 1px;
    width: 80px;
    background: linear-gradient(to right, transparent, #c8845a);
  }
  .divider-line.right {
    background: linear-gradient(to left, transparent, #c8845a);
  }

  .divider-dot {
    color: #c8845a;
    font-size: 1.2rem;
  }

  .message {
    font-size: clamp(1rem, 2.2vw, 1.25rem);
    color: #d4b8a0;
    line-height: 1.9;
    font-weight: 300;
    font-style: italic;
    max-width: 480px;
    margin: 0 auto 2.5rem;
  }

  /* CAKE */
  .cake-container {
    margin: 2rem auto;
    width: 140px;
    position: relative;
  }

  .cake-base {
    width: 140px;
    height: 50px;
    background: #8b3a2a;
    border-radius: 12px;
    position: relative;
    overflow: hidden;
  }
  .cake-base::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 14px;
    background: #e8b48a;
    border-radius: 12px 12px 0 0;
  }
  .cake-base::after {
    content: '';
    position: absolute;
    top: 8px; left: 50%; transform: translateX(-50%);
    width: 80%; height: 2px;
    background: rgba(255,255,255,0.15);
    border-radius: 2px;
  }

  .cake-top {
    width: 120px;
    height: 40px;
    background: #a0402e;
    border-radius: 10px;
    margin: 0 auto;
    position: relative;
    overflow: hidden;
  }
  .cake-top::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 12px;
    background: #f0c8a0;
    border-radius: 10px 10px 0 0;
  }

  .candle {
    width: 14px;
    height: 36px;
    background: linear-gradient(to bottom, #f5d87a, #e8a840);
    border-radius: 4px 4px 2px 2px;
    margin: 0 auto;
    position: relative;
  }

  .candle::before {
    content: '';
    position: absolute;
    top: -2px; left: 50%; transform: translateX(-50%);
    width: 2px; height: 8px;
    background: #3a2010;
    border-radius: 2px;
  }

  .flame {
    position: absolute;
    top: -32px;
    left: 50%;
    transform: translateX(-50%);
    width: 18px;
    height: 26px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .flame-inner {
    width: 10px;
    height: 18px;
    background: radial-gradient(ellipse at 50% 70%, #fff8e1, #ffe066, #ff9800, #e64a19);
    border-radius: 50% 50% 30% 30%;
    animation: flicker 0.8s ease-in-out infinite alternate;
    filter: blur(0.5px);
  }

  .flame-glow {
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: 30px;
    height: 34px;
    background: radial-gradient(ellipse, rgba(255,180,60,0.45) 0%, transparent 70%);
    border-radius: 50%;
    animation: flicker 0.8s ease-in-out infinite alternate;
  }

  @keyframes flicker {
    0%   { transform: translateX(-50%) scaleX(1) scaleY(1); opacity: 1; }
    50%  { transform: translateX(-50%) scaleX(0.9) scaleY(1.05); opacity: 0.92; }
    100% { transform: translateX(-50%) scaleX(1.05) scaleY(0.95); opacity: 1; }
  }

  .flame.out {
    display: none;
  }

  .smoke {
    display: none;
    position: absolute;
    top: -28px;
    left: 50%;
    transform: translateX(-50%);
  }

  .smoke.show { display: block; }

  .smoke-particle {
    position: absolute;
    width: 6px; height: 6px;
    background: rgba(200,190,180,0.7);
    border-radius: 50%;
    animation: smokeUp 1.5s ease-out forwards;
  }

  @keyframes smokeUp {
    0%   { transform: translateX(0) translateY(0) scale(1); opacity: 0.7; }
    100% { transform: translateX(var(--dx)) translateY(-40px) scale(3); opacity: 0; }
  }

  .blow-btn {
    display: block;
    margin: 1.2rem auto 0;
    background: none;
    border: 1px solid #c8845a;
    color: #c8845a;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    letter-spacing: 0.15em;
    padding: 0.6rem 1.8rem;
    border-radius: 30px;
    cursor: pointer;
    transition: all 0.3s ease;
    font-style: italic;
  }

  .blow-btn:hover {
    background: rgba(200,132,90,0.12);
    border-color: #e8b48a;
    color: #e8b48a;
  }

  .blow-btn.blown {
    border-color: #8a7060;
    color: #8a7060;
    cursor: default;
  }

  .relight-btn {
    display: none;
    margin: 0.5rem auto 0;
    background: none;
    border: 1px solid #8a7060;
    color: #8a7060;
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.85rem;
    letter-spacing: 0.12em;
    padding: 0.4rem 1.4rem;
    border-radius: 30px;
    cursor: pointer;
    transition: all 0.3s ease;
    font-style: italic;
  }

  .relight-btn:hover {
    border-color: #c8845a;
    color: #c8845a;
  }

  .relight-btn.show { display: block; }

  .wish {
    font-size: clamp(0.9rem, 2vw, 1.05rem);
    color: #9a7060;
    letter-spacing: 0.08em;
    margin-top: 2.5rem;
    font-style: italic;
    opacity: 0.8;
  }

  .hearts {
    margin-top: 1rem;
    color: #c8845a;
    font-size: 1.3rem;
    letter-spacing: 0.5rem;
    animation: heartbeat 2s ease-in-out infinite;
  }

  @keyframes heartbeat {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.7; transform: scale(0.95); }
  }

  .bg-glow {
    position: fixed;
    top: 30%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 600px;
    height: 600px;
    background: radial-gradient(ellipse, rgba(160,60,20,0.18) 0%, transparent 70%);
    pointer-events: none;
    z-index: 1;
  }
</style>
</head>
<body>

<div class="bg-glow"></div>
<canvas id="garden-canvas"></canvas>
<canvas id="petal-canvas"></canvas>

<div class="card">
  <p class="para">Con todo el amor del mundo</p>

  <h1>Feliz<br><em>Cumpleaños</em></h1>
  <p class="subtitle">Mamá</p>

  <div class="divider">
    <div class="divider-line"></div>
    <span class="divider-dot">✦</span>
    <div class="divider-line right"></div>
  </div>


  <div class="cake-container">
    <div class="candle" id="candle">
      <div class="flame" id="flame">
        <div class="flame-glow"></div>
        <div class="flame-inner"></div>
      </div>
      <div class="smoke" id="smoke"></div>
    </div>
    <div class="cake-top"></div>
    <div class="cake-base"></div>
  </div>

  <button class="blow-btn" id="blow-btn" onclick="blowCandle()">✦ Soplar la velita</button>
  <button class="relight-btn" id="relight-btn" onclick="relightCandle()">volver a encender</button>

  <div class="divider" style="margin-top: 2.5rem;">
    <div class="divider-line"></div>
    <span class="divider-dot">✦</span>
    <div class="divider-line right"></div>
  </div>

  <p class="wish">Hecho con código y con corazón</p>
  <div class="hearts">♥ ♥ ♥</div>
</div>

<script>
// ─── FLOWER GARDEN ────────────────────────────────────────────────
const gardenCanvas = document.getElementById('garden-canvas');
const gCtx = gardenCanvas.getContext('2d');
let flowers = [];
let gardenW, gardenH;

function resizeGarden() {
  gardenW = gardenCanvas.width = window.innerWidth;
  gardenH = gardenCanvas.height = window.innerHeight * 0.6;
}

resizeGarden();
window.addEventListener('resize', () => { resizeGarden(); flowers = []; spawnFlowers(); });

const PALETTE = [
  { stem: '#4a7a3a', petals: ['#e87a8a','#f0a0b0','#f5c8d0'], center: '#f5e060' },
  { stem: '#3d6e4a', petals: ['#d4608a','#e88ab0','#f0b0c8'], center: '#f5d840' },
  { stem: '#5a8040', petals: ['#c86050','#e88878','#f0a898'], center: '#f5e870' },
  { stem: '#4a7060', petals: ['#d07030','#e89850','#f5b870'], center: '#f5f0a0' },
  { stem: '#3d6060', petals: ['#a060c8','#c888e0','#e0b0f5'], center: '#ffe080' },
];

function makeFlower(x) {
  const pal = PALETTE[Math.floor(Math.random() * PALETTE.length)];
  const size = 18 + Math.random() * 28;
  const stemH = 60 + Math.random() * 100;
  return {
    x, y: gardenH,
    size, stemH,
    pal,
    grown: 0,
    speed: 0.004 + Math.random() * 0.006,
    sway: Math.random() * Math.PI * 2,
    swayAmp: 2 + Math.random() * 4,
    petalCount: 5 + Math.floor(Math.random() * 4),
    delay: Math.random() * 300,
  };
}

function spawnFlowers() {
  const count = Math.floor(gardenW / 55);
  for (let i = 0; i < count; i++) {
    const x = 40 + (i / count) * (gardenW - 80) + (Math.random() - 0.5) * 60;
    flowers.push(makeFlower(x));
  }
}

spawnFlowers();

function drawFlower(f, t) {
  if (f.delay > 0) { f.delay -= 16; return; }
  if (f.grown < 1) f.grown = Math.min(1, f.grown + f.speed);
  const g = f.grown;
  const sway = Math.sin(t * 0.001 + f.sway) * f.swayAmp * g;

  // Stem
  gCtx.save();
  gCtx.strokeStyle = f.pal.stem;
  gCtx.lineWidth = 2.5;
  gCtx.beginPath();
  gCtx.moveTo(f.x, f.y);
  const tipX = f.x + sway;
  const tipY = f.y - f.stemH * g;
  gCtx.quadraticCurveTo(f.x + sway * 0.5, f.y - f.stemH * g * 0.5, tipX, tipY);
  gCtx.stroke();

  // Leaf
  if (g > 0.4) {
    const lg = (g - 0.4) / 0.6;
    const leafX = f.x + sway * 0.4;
    const leafY = f.y - f.stemH * 0.45 * g;
    gCtx.save();
    gCtx.translate(leafX, leafY);
    gCtx.rotate(-0.4 * lg);
    gCtx.fillStyle = f.pal.stem;
    gCtx.beginPath();
    gCtx.ellipse(12 * lg, 0, 18 * lg, 6 * lg, 0, 0, Math.PI * 2);
    gCtx.fill();
    gCtx.restore();
  }

  // Flower head
  if (g > 0.65) {
    const fg = (g - 0.65) / 0.35;
    gCtx.save();
    gCtx.translate(tipX, tipY);
    for (let p = 0; p < f.petalCount; p++) {
      const angle = (p / f.petalCount) * Math.PI * 2 + t * 0.0004;
      const petalColor = f.pal.petals[p % f.pal.petals.length];
      gCtx.save();
      gCtx.rotate(angle);
      gCtx.fillStyle = petalColor;
      gCtx.globalAlpha = 0.85 * fg;
      gCtx.beginPath();
      gCtx.ellipse(f.size * 0.55 * fg, 0, f.size * 0.55 * fg, f.size * 0.28 * fg, 0, 0, Math.PI * 2);
      gCtx.fill();
      gCtx.restore();
    }
    // center
    gCtx.globalAlpha = fg;
    gCtx.fillStyle = f.pal.center;
    gCtx.beginPath();
    gCtx.arc(0, 0, f.size * 0.26 * fg, 0, Math.PI * 2);
    gCtx.fill();
    gCtx.fillStyle = 'rgba(0,0,0,0.15)';
    gCtx.beginPath();
    gCtx.arc(0, 0, f.size * 0.12 * fg, 0, Math.PI * 2);
    gCtx.fill();
    gCtx.restore();
  }
  gCtx.restore();
}

// ─── PETALS ───────────────────────────────────────────────────────
const petalCanvas = document.getElementById('petal-canvas');
const pCtx = petalCanvas.getContext('2d');
let petals = [];
let petW, petH;

function resizePetal() {
  petW = petalCanvas.width = window.innerWidth;
  petH = petalCanvas.height = window.innerHeight;
}
resizePetal();
window.addEventListener('resize', resizePetal);

function makePetal() {
  return {
    x: Math.random() * petW,
    y: -20,
    size: 5 + Math.random() * 10,
    speed: 1 + Math.random() * 2,
    drift: (Math.random() - 0.5) * 1.5,
    spin: (Math.random() - 0.5) * 0.08,
    angle: Math.random() * Math.PI * 2,
    color: ['#e87a8a','#f0a0b0','#d4608a','#e8b48a','#c8845a'][Math.floor(Math.random()*5)],
    opacity: 0.4 + Math.random() * 0.5,
  };
}

let lastSpawn = 0;
function spawnPetal(t) {
  if (t - lastSpawn > 350) {
    petals.push(makePetal());
    lastSpawn = t;
  }
}

function updatePetals() {
  petals = petals.filter(p => p.y < petH + 30);
  petals.forEach(p => {
    p.y += p.speed;
    p.x += p.drift + Math.sin(p.y * 0.02) * 0.8;
    p.angle += p.spin;
  });
}

function drawPetals() {
  pCtx.clearRect(0, 0, petW, petH);
  petals.forEach(p => {
    pCtx.save();
    pCtx.translate(p.x, p.y);
    pCtx.rotate(p.angle);
    pCtx.globalAlpha = p.opacity;
    pCtx.fillStyle = p.color;
    pCtx.beginPath();
    pCtx.ellipse(0, 0, p.size, p.size * 0.5, 0, 0, Math.PI * 2);
    pCtx.fill();
    pCtx.restore();
  });
}

// ─── CANDLE ───────────────────────────────────────────────────────
let blown = false;
function blowCandle() {
  if (blown) return;
  blown = true;
  document.getElementById('flame').classList.add('out');
  const smoke = document.getElementById('smoke');
  smoke.classList.add('show');
  for (let i = 0; i < 6; i++) {
    const s = document.createElement('div');
    s.className = 'smoke-particle';
    const dx = (Math.random() - 0.5) * 30;
    s.style.setProperty('--dx', dx + 'px');
    s.style.left = (Math.random() * 10 - 5) + 'px';
    s.style.animationDelay = (i * 0.15) + 's';
    smoke.appendChild(s);
  }
  document.getElementById('blow-btn').classList.add('blown');
  document.getElementById('blow-btn').textContent = '✦ ¡Pediste un deseo!';
  setTimeout(() => {
    smoke.innerHTML = '';
    smoke.classList.remove('show');
    document.getElementById('relight-btn').classList.add('show');
    // burst confetti
    burstConfetti();
  }, 2500);
}

function relightCandle() {
  blown = false;
  document.getElementById('flame').classList.remove('out');
  document.getElementById('blow-btn').classList.remove('blown');
  document.getElementById('blow-btn').textContent = '✦ Soplar la velita';
  document.getElementById('relight-btn').classList.remove('show');
}

// ─── CONFETTI BURST ───────────────────────────────────────────────
let confetti = [];
function burstConfetti() {
  for (let i = 0; i < 80; i++) {
    confetti.push({
      x: petW / 2 + (Math.random() - 0.5) * 200,
      y: petH * 0.4,
      vx: (Math.random() - 0.5) * 10,
      vy: -5 - Math.random() * 8,
      size: 4 + Math.random() * 8,
      color: ['#e87a8a','#f0c840','#60c880','#60a8e0','#e8a840','#c880e8','#f5d0b0'][Math.floor(Math.random()*7)],
      life: 1,
      gravity: 0.25,
      angle: Math.random() * Math.PI * 2,
      spin: (Math.random() - 0.5) * 0.2,
    });
  }
}

function updateConfetti() {
  confetti = confetti.filter(c => c.life > 0);
  confetti.forEach(c => {
    c.x += c.vx;
    c.y += c.vy;
    c.vy += c.gravity;
    c.vx *= 0.99;
    c.angle += c.spin;
    c.life -= 0.012;
  });
}

function drawConfetti() {
  confetti.forEach(c => {
    pCtx.save();
    pCtx.translate(c.x, c.y);
    pCtx.rotate(c.angle);
    pCtx.globalAlpha = c.life;
    pCtx.fillStyle = c.color;
    pCtx.fillRect(-c.size / 2, -c.size / 2, c.size, c.size * 0.5);
    pCtx.restore();
  });
}

// ─── MAIN LOOP ────────────────────────────────────────────────────
function loop(t) {
  // Garden
  gCtx.clearRect(0, 0, gardenW, gardenH);
  flowers.forEach(f => drawFlower(f, t));

  // Petals + confetti
  spawnPetal(t);
  updatePetals();
  updateConfetti();
  pCtx.clearRect(0, 0, petW, petH);
  drawPetals();
  drawConfetti();

  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
</body>
</html>
